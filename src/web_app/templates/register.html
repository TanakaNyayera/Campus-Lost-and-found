{% extends "base.html" %}
{% block title %}Register — MSU Lost & Found{% endblock %}
{% block content %}
<div style="max-width:520px; margin:40px auto;">
    <div class="card">
        <div class="card-title">Create Your Account</div>
        <form method="POST">
            <div class="grid-2">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="full_name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Student ID</label>
                    <input type="text" name="student_id" class="form-control" placeholder="R123456Y">
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" class="form-control" placeholder="+263 77 123 4567">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-gold" style="width:100%;">Create Account</button>
        </form>
        <p style="text-align:center; margin-top:20px; color:#666; font-size:0.9rem;">
            Already have an account? <a href="/login" style="color:var(--navy); font-weight:600;">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
