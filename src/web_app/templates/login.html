{% extends "base.html" %}
{% block title %}Login — MSU Lost & Found{% endblock %}
{% block content %}
<div style="max-width:460px; margin:40px auto;">
    <div class="card">
        <div class="card-title">Login to Your Account</div>
        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="form-group" style="margin-top:14px;">
                <label>Login Destination</label>
                <select name="login_destination" class="form-control" required>
                    <option value="student" selected>Student</option>
                    <option value="admin">Admin</option>
                </select>
                <small style="display:block;color:#666;font-size:0.85rem;margin-top:6px;">
                    Your account role in the system decides if you can access Admin features.
                </small>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
        </form>

        <p style="text-align:center; margin-top:20px; color:#666; font-size:0.9rem;">
            Don't have an account? <a href="/register" style="color:var(--navy); font-weight:600;">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
